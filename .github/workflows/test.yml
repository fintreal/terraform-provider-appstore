name: Test Provider

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  APPSTORE_KEY: ${{ secrets.APPSTORE_KEY }}
  APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
  APPSTORE_KEY_ISSUER_ID: ${{ secrets.APPSTORE_KEY_ISSUER_ID }}

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/internal/appstore/test') -count=1 -cover

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    env:
      KEY_DATA: ${{ secrets.APPSTORE_KEY }}
      KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      ISSUER_ID: ${{ secrets.APPSTORE_KEY_ISSUER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run SDK integration tests
        run: go test ./internal/appstore/test/... -count=1 -cover

  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install provider
        run: go install .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"

      - name: Setup Terraformrc
        run: |
          mkdir -p ~/.terraform.d/plugins
          cat > ~/.terraformrc << 'EOF'
          provider_installation {
            dev_overrides {
              "fintreal/appstore" = "/home/runner/go/bin"
            }
          }
          EOF

      - name: Terraform Apply
        working-directory: .github/test
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: always()
        working-directory: .github/test
        run: terraform destroy -auto-approve
