name: Nightly

# Scheduled canary run of the same tests as test.yaml. Kept in a separate
# file (no pull_request trigger) so that GitHub's inactivity auto-disable of
# scheduled workflows can never take the PR checks down with it.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  KEY_DATA: ${{ secrets.KEY_DATA }}
  KEY_ID: ${{ secrets.KEY_ID }}
  ISSUER_ID: ${{ secrets.ISSUER_ID }}

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run tests
        run: go test ./test/... -count=1 -cover
